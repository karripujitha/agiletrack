{% extends 'base.html' %}
{% block title %}Delete Task – AgileTrack{% endblock %}
{% block page_title %}Delete Task{% endblock %}

{% block content %}
<div class="form-card" style="max-width:480px">
    <div class="text-center py-3">
        <div style="font-size:3rem; color:#ef4444; margin-bottom:16px">
            <i class="bi bi-trash3"></i>
        </div>
        <h4 class="fw-700 mb-2">Delete this task?</h4>
        <p class="text-muted mb-4">
            <strong>"{{ task.title }}"</strong><br>
            This action cannot be undone.
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
            </form>
            <a href="{% url 'task_detail' task.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
