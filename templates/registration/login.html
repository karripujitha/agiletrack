{% extends 'base.html' %}
{% block title %}Login – AgileTrack{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <i class="bi bi-kanban-fill"></i> AgileTrack
    </div>
    <p class="auth-subtitle">Sign in to your workspace</p>

    {% if form.errors %}
    <div class="alert alert-danger">Invalid username or password.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
    </form>
    <p class="text-center mt-4 mb-0 text-muted" style="font-size:0.875rem">
        Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </p>
</div>
{% endblock %}
